<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="theme-color" content="#000000" />
        <meta name="description" content="NEXIQ - Premium AI Assistant for Developers" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="icon" href="%PUBLIC_URL%/logo.png" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet" />
        <title>NEXIQ</title>
        <script>window.addEventListener("error",function(e){if(e.error instanceof DOMException&&e.error.name==="DataCloneError"&&e.message&&e.message.includes("PerformanceServerTiming")){e.stopImmediatePropagation();e.preventDefault()}},true);</script>
        <style>
            #NEXIQ-footer {
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                z-index: 9999;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 6px 16px;
                background: linear-gradient(90deg, rgba(99,102,241,0.08) 0%, rgba(0,0,0,0.85) 50%, rgba(99,102,241,0.08) 100%);
                backdrop-filter: blur(10px);
                border-top: 1px solid rgba(99,102,241,0.15);
                font-family: 'Inter', sans-serif;
                font-size: 12px;
                color: rgba(255,255,255,0.45);
                gap: 6px;
                transition: all 0.3s ease;
                cursor: default;
                user-select: none;
            }
            #NEXIQ-footer:hover {
                color: rgba(255,255,255,0.75);
                background: linear-gradient(90deg, rgba(99,102,241,0.15) 0%, rgba(0,0,0,0.9) 50%, rgba(99,102,241,0.15) 100%);
                border-top-color: rgba(99,102,241,0.35);
            }
            #NEXIQ-footer .footer-heart {
                display: inline-block;
                color: #f43f5e;
                animation: heartbeat 1.5s ease-in-out infinite;
                font-size: 13px;
            }
            #NEXIQ-footer .footer-name {
                color: rgba(167,139,250,0.9);
                font-weight: 600;
                transition: color 0.2s;
            }
            #NEXIQ-footer:hover .footer-name {
                color: rgba(167,139,250,1);
            }
            #NEXIQ-footer .footer-dot {
                color: rgba(255,255,255,0.2);
            }
            #NEXIQ-footer .footer-copy {
                font-size: 11px;
            }
            @keyframes heartbeat {
                0%, 100% { transform: scale(1); }
                50% { transform: scale(1.25); }
            }
        </style>
    </head>
    <body>
        <noscript>You need to enable JavaScript to run this app.</noscript>
        <div id="root"></div>

        <footer id="NEXIQ-footer">
            <span>Built with</span>
            <span class="footer-heart">♥</span>
            <span>by</span>
            <span class="footer-name">Bhavesh</span>
            <span class="footer-dot">•</span>
            <span class="footer-copy">© <span id="footer-year"></span> NEXIQ. All rights reserved.</span>
        </footer>

        <script>
            document.getElementById('footer-year').textContent = new Date().getFullYear();
        </script>
    </body>
</html>
